orchestrator:
  sessionPrefix: "orc-"
  maxConcurrentAgents: 3
  dataDir: "~/.orchestrator"
  db: "~/.orchestrator/orchestrator.db"
  logDir: "~/.orchestrator/logs"

budget:
  defaultMaxPerTask: 0.50
  globalDailyLimit: 10.00
  warningThreshold: 0.80

providers:
  claude:
    command: "claude"
    defaultModel: "sonnet"
    flags: ["-p", "--output-format", "stream-json"]
    capabilities:
      models: ["haiku", "sonnet", "opus"]
      strengths: ["architecture", "code-generation", "debugging", "review", "testing", "refactoring", "security"]
      weaknesses: []
      maxContextTokens: 200000
      supportsStreaming: true
      supportsToolUse: true
      costTier: "high"
  codex:
    command: "codex"
    subcommand: "exec"
    defaultModel: null
    flags: ["--full-auto"]
    capabilities:
      models: ["codex"]
      strengths: ["code-generation", "refactoring", "implementation", "file-editing"]
      weaknesses: ["architecture", "documentation"]
      maxContextTokens: 192000
      supportsStreaming: false
      supportsToolUse: true
      costTier: "medium"
  gemini:
    command: "gemini"
    defaultModel: "gemini-2.5-pro"
    flags: []
    capabilities:
      models: ["gemini-2.5-pro", "gemini-2.5-flash"]
      strengths: ["large-context", "research", "analysis", "documentation", "review"]
      weaknesses: ["file-editing", "tool-use"]
      maxContextTokens: 1000000
      supportsStreaming: true
      supportsToolUse: true
      costTier: "medium"
  kiro:
    command: "kiro"
    subcommand: "cli"
    defaultModel: null
    flags: []
    capabilities:
      models: ["kiro"]
      strengths: ["spec-driven", "implementation", "testing", "code-generation"]
      weaknesses: ["architecture", "review", "debugging"]
      maxContextTokens: 128000
      supportsStreaming: false
      supportsToolUse: false
      costTier: "low"

routing:
  tiers:
    simple:
      model: "haiku"
      keywords: ["format", "rename", "typo", "lint", "style"]
    medium:
      model: "sonnet"
      keywords: ["refactor", "test", "review", "implement", "fix"]
    complex:
      model: "opus"
      keywords: ["architect", "design", "security", "optimize", "migrate"]

supervisor:
  enabled: true
  workerTimeout: 300000
  maxRetries: 2
  costAware: true
  preferredProviders: ["claude", "codex", "gemini", "kiro"]
  multiTurn:
    defaultMaxTurns: 25
    simpleMaxTurns: 5
    standardMaxTurns: 15
    complexMaxTurns: 50
    checkpointIntervalTurns: 5
    progressPollIntervalMs: 3000
    idleTimeoutMs: 120000
  feedback:
    enabled: true
    checkIntervalMs: 30000
    maxCorrections: 3
    qualityGateOnComplete: true
    qaLoopOnFail: true
  workerBus:
    enabled: true
    broadcastArtifacts: true
  contextPropagation:
    enabled: true
    includeCodebaseMap: true
    includeMemory: true
    maxContextTokens: 4000
    summarizeSiblingResults: true
