<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo 3: CRM Data View — Relate + Linear reference (AG Grid)</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/ag-grid-community@32.3.3/dist/ag-grid-community.min.js"></script>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css');
  * { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
  body { -webkit-font-smoothing: antialiased; word-break: keep-all; letter-spacing: -0.01em; }

  /* AG Grid dark theme override — Relate-style */
  .ag-theme-alpine-dark {
    --ag-background-color: #14141e;
    --ag-header-background-color: #1a1a28;
    --ag-odd-row-background-color: #14141e;
    --ag-row-hover-color: #1e1e2e;
    --ag-selected-row-background-color: #1e1e2e;
    --ag-border-color: rgba(255,255,255,0.06);
    --ag-header-foreground-color: #64748b;
    --ag-foreground-color: #e2e8f0;
    --ag-secondary-foreground-color: #94a3b8;
    --ag-row-border-color: rgba(255,255,255,0.04);
    --ag-font-size: 13px;
    --ag-header-height: 36px;
    --ag-row-height: 40px;
    --ag-grid-size: 4px;
    --ag-cell-horizontal-padding: 12px;
    --ag-font-family: 'Pretendard', -apple-system, sans-serif;
    --ag-alpine-active-color: #3b82f6;
    --ag-range-selection-border-color: #3b82f6;
    --ag-header-column-separator-display: none;
    --ag-card-shadow: none;
    --ag-popup-shadow: none;
  }
  .ag-theme-alpine-dark .ag-header-cell-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .ag-theme-alpine-dark .ag-cell {
    line-height: 40px;
  }
  .ag-theme-alpine-dark .ag-root-wrapper {
    border: none;
    border-radius: 0;
  }

  /* Status dot component */
  .status-dot {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .status-dot .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }
  .dot-active { background: #34d399; }
  .dot-inactive { background: #475569; }
  .dot-error { background: #f87171; }

  /* Mono cell */
  .mono-cell {
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 12px;
    color: #64748b;
  }

  /* Danger text */
  .danger-text { color: #f87171; }
</style>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        dark: { 950: '#0a0a0f', 900: '#14141e', 800: '#1e1e2e', 700: '#2a2a3d' },
        bdr: { DEFAULT: 'rgba(255,255,255,0.06)', strong: 'rgba(255,255,255,0.10)' },
        t: { 50: '#f8fafc', 100: '#e2e8f0', 300: '#94a3b8', 400: '#64748b', 500: '#475569' },
        accent: { 500: '#3b82f6', 600: '#2563eb' },
      }
    }
  }
}
</script>
</head>
<body class="bg-dark-950 text-t-50">

<div class="flex h-screen">
  <!-- Sidebar: Relate-style unified dark -->
  <aside class="flex w-52 flex-col border-r border-bdr bg-dark-900">
    <div class="flex h-12 items-center px-4">
      <span class="text-[13px] font-semibold text-t-100">OrcFlow</span>
    </div>
    <nav class="flex-1 px-2 py-1">
      <ul class="space-y-0.5 text-[13px]">
        <li><a href="#" class="flex items-center gap-2 rounded-md px-2.5 py-1.5 text-t-400 hover:bg-dark-800 hover:text-t-100 transition-colors cursor-pointer">
          <svg class="h-4 w-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
          홈</a></li>
        <li><a href="#" class="flex items-center gap-2 rounded-md bg-dark-800 px-2.5 py-1.5 text-t-50 font-medium cursor-pointer">

          에이전트</a></li>

          <svg class="h-4 w-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
          태스크</a></li>
        <li><a href="#" class="flex items-center gap-2 rounded-md px-2.5 py-1.5 text-t-400 hover:bg-dark-800 hover:text-t-100 transition-colors cursor-pointer">
          <svg class="h-4 w-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
          분석</a></li>
        <li><a href="#" class="flex items-center gap-2 rounded-md px-2.5 py-1.5 text-t-400 hover:bg-dark-800 hover:text-t-100 transition-colors cursor-pointer">
          <svg class="h-4 w-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/></svg>
          설정</a></li>
      </ul>
    </nav>
    <div class="border-t border-bdr px-3 py-3">
      <div class="flex items-center gap-2">
        <div class="h-6 w-6 rounded-full bg-accent-500 flex items-center justify-center">
          <span class="text-[10px] font-medium text-white">S</span>
        </div>
        <span class="text-[12px] text-t-400">workspace</span>
      </div>
    </div>
  </aside>

  <!-- Main content -->
  <main class="flex-1 flex flex-col overflow-hidden">
    <!-- Header bar -->
    <div class="flex items-center justify-between border-b border-bdr px-5 py-3">
      <div>
        <h1 class="text-[15px] font-semibold">에이전트 관리</h1>
        <p class="text-[12px] text-t-400">18개 에이전트 등록됨</p>
      </div>
      <div class="flex items-center gap-2">
        <div class="flex items-center rounded-md border border-bdr-strong bg-dark-900 px-2.5 py-1.5">
          <svg class="h-3.5 w-3.5 text-t-500 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input type="text" placeholder="검색..." class="bg-transparent text-[12px] text-t-100 placeholder-t-500 outline-none w-40">
        </div>
        <button class="rounded-md border border-bdr-strong px-2.5 py-1.5 text-[12px] text-t-300 hover:bg-dark-800 transition-colors cursor-pointer">필터</button>
        <button class="rounded-md bg-accent-500 px-3 py-1.5 text-[12px] font-medium text-white hover:bg-accent-600 transition-colors cursor-pointer">추가</button>
      </div>
    </div>

    <!-- AG Grid -->
    <div id="agGrid" class="ag-theme-alpine-dark flex-1"></div>
  </main>
</div>

<script>
function statusRenderer(params) {
  const map = {
    '활성': '<span class="status-dot"><span class="dot dot-active"></span>활성</span>',
    '비활성': '<span class="status-dot"><span class="dot dot-inactive"></span>비활성</span>',
    '오류': '<span class="status-dot"><span class="dot dot-error"></span>오류</span>',
  };
  return map[params.value] || params.value;
}

function modelRenderer(params) {
  return `<span class="mono-cell">${params.value}</span>`;
}

function successRenderer(params) {
  const val = params.value;
  if (val < 80) return `<span class="danger-text">${val}%</span>`;
  return `${val}%`;
}

function timeRenderer(params) {
  return `<span style="color:#64748b">${params.value}초</span>`;
}

const columnDefs = [
  { field: 'name', headerName: '이름', minWidth: 140, flex: 1.2,
    cellStyle: { fontWeight: 500, color: '#f8fafc' } },
  { field: 'role', headerName: '역할', minWidth: 120, flex: 1,
    cellStyle: { color: '#94a3b8' } },
  { field: 'status', headerName: '상태', width: 100, cellRenderer: statusRenderer },
  { field: 'model', headerName: '모델', width: 90, cellRenderer: modelRenderer },
  { field: 'provider', headerName: '프로바이더', width: 100,
    cellStyle: { color: '#64748b', fontSize: '12px' } },
  { field: 'runs', headerName: '실행', width: 90, type: 'numericColumn',
    valueFormatter: p => p.value.toLocaleString(),
    cellStyle: { color: '#94a3b8' } },
  { field: 'success', headerName: '성공률', width: 90, type: 'numericColumn',
    cellRenderer: successRenderer },
  { field: 'avgTime', headerName: '평균', width: 80, type: 'numericColumn',
    cellRenderer: timeRenderer },
  { field: 'lastRun', headerName: '최근 실행', width: 120,
    cellStyle: { color: '#475569', fontSize: '12px' } },
  { field: 'budget', headerName: '예산', width: 90, type: 'numericColumn',
    valueFormatter: p => `$${p.value.toFixed(2)}`,
    cellStyle: { color: '#64748b', fontSize: '12px' } },
];

const rowData = [
  { name: 'Ideation', role: '전략 수립', status: '활성', model: 'opus', provider: 'anthropic', runs: 342, success: 99.1, avgTime: 1.8, lastRun: '2분 전', budget: 0.50 },
  { name: 'Decomposer', role: '태스크 분해', status: '활성', model: 'opus', provider: 'anthropic', runs: 287, success: 97.6, avgTime: 2.4, lastRun: '5분 전', budget: 0.50 },
  { name: 'Router', role: '라우팅', status: '활성', model: 'sonnet', provider: 'anthropic', runs: 1204, success: 99.8, avgTime: 0.3, lastRun: '1분 전', budget: 0.15 },
  { name: 'Critique', role: '코드 리뷰', status: '비활성', model: 'opus', provider: 'anthropic', runs: 156, success: 94.2, avgTime: 3.1, lastRun: '1시간 전', budget: 0.50 },
  { name: 'QA', role: '테스트', status: '활성', model: 'sonnet', provider: 'anthropic', runs: 489, success: 96.3, avgTime: 4.2, lastRun: '8분 전', budget: 0.20 },
  { name: 'Supervisor', role: '오케스트레이션', status: '활성', model: 'opus', provider: 'anthropic', runs: 1284, success: 98.7, avgTime: 0.8, lastRun: '1분 전', budget: 0.50 },
  { name: 'Design', role: 'UI 설계', status: '오류', model: 'opus', provider: 'anthropic', runs: 23, success: 67.4, avgTime: 5.8, lastRun: '30분 전', budget: 0.50 },
  { name: 'Planner', role: '프로젝트 계획', status: '활성', model: 'opus', provider: 'anthropic', runs: 98, success: 95.9, avgTime: 2.1, lastRun: '15분 전', budget: 0.50 },
  { name: 'Coder', role: '코드 생성', status: '활성', model: 'sonnet', provider: 'anthropic', runs: 567, success: 91.4, avgTime: 6.3, lastRun: '3분 전', budget: 0.20 },
  { name: 'Debugger', role: '디버깅', status: '활성', model: 'sonnet', provider: 'anthropic', runs: 203, success: 88.7, avgTime: 4.9, lastRun: '12분 전', budget: 0.20 },
  { name: 'Docs', role: '문서 생성', status: '비활성', model: 'haiku', provider: 'anthropic', runs: 134, success: 97.0, avgTime: 1.2, lastRun: '2시간 전', budget: 0.05 },
  { name: 'Security', role: '보안 검토', status: '활성', model: 'opus', provider: 'anthropic', runs: 78, success: 100.0, avgTime: 3.4, lastRun: '20분 전', budget: 0.50 },
  { name: 'Translator', role: '다국어 번역', status: '비활성', model: 'haiku', provider: 'anthropic', runs: 45, success: 93.3, avgTime: 0.9, lastRun: '3시간 전', budget: 0.05 },
  { name: 'Refactor', role: '리팩토링', status: '활성', model: 'sonnet', provider: 'anthropic', runs: 112, success: 89.3, avgTime: 7.1, lastRun: '25분 전', budget: 0.20 },
];

const gridOptions = {
  columnDefs,
  rowData,
  defaultColDef: {
    sortable: true,
    resizable: true,
  },
  animateRows: true,
  rowSelection: 'single',
  suppressCellFocus: false,
  headerHeight: 36,
  rowHeight: 40,
};

const gridDiv = document.querySelector('#agGrid');
const api = agGrid.createGrid(gridDiv, gridOptions);
</script>

</body>
</html>
